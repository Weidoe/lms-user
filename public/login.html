<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入 - 緯豆考試系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: linear-gradient(135deg, #f6f9fc 0%, #eef2f7 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 1rem;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(0,198,255,0.12) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(0,114,255,0.12) 0%, transparent 50%);
      z-index: 1;
    }
    .login-container {
      position: relative;
      z-index: 2;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.85);
      border-radius: 20px;
      padding: 2rem 1.75rem;
      width: 100%;
      max-width: 340px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      transition: transform 0.3s ease;
    }
    .login-container:hover { transform: translateY(-4px); }
    .input-field {
      background: rgba(255,255,255,0.85);
      border: 1.5px solid rgba(0,0,0,0.1);
      border-radius: 10px;
      padding: 0.75rem 1rem 0.75rem 2.75rem;
      color: #333;
      width: 100%;
      transition: all 0.25s ease;
      font-size: 0.95rem;
      font-family: 'Noto Sans TC', sans-serif;
    }
    .input-field:focus {
      background: rgba(255,255,255,1);
      border-color: rgba(0,198,255,0.5);
      outline: none;
      box-shadow: 0 0 0 3px rgba(0,198,255,0.12);
    }
    .login-button {
      background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
      border: none;
      border-radius: 10px;
      padding: 0.8rem 1.5rem;
      color: white;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 1rem;
    }
    .login-button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,198,255,0.35);
    }
    .login-button:disabled { background: #ccc; cursor: not-allowed; }
    .error-box {
      background: rgba(255,50,50,0.08);
      border: 1px solid rgba(255,50,50,0.25);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: #d32f2f;
      font-size: 0.9rem;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .logo-title {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="text-center mb-6">
      <div class="logo-title">緯豆考試系統</div>
      <p class="text-gray-500 text-sm mt-1">請登入您的帳號</p>
    </div>

    <div id="errorBox" class="error-box mb-4 hidden"></div>

    <form id="loginForm" autocomplete="off">
      <div class="mb-4 relative">
        <label class="block text-gray-700 font-medium text-sm mb-1" for="username">使用者名稱</label>
        <span class="material-icons absolute left-3 top-8 text-gray-400" style="font-size:1.2rem">person</span>
        <input id="username" name="username" type="text" class="input-field" placeholder="Axxxxxx" required autocomplete="username">
      </div>
      <div class="mb-5 relative">
        <label class="block text-gray-700 font-medium text-sm mb-1" for="password">密碼</label>
        <span class="material-icons absolute left-3 top-8 text-gray-400" style="font-size:1.2rem">lock</span>
        <input id="password" name="password" type="password" class="input-field" placeholder="請輸入密碼" required autocomplete="current-password">
      </div>
      <button id="submitBtn" type="submit" class="login-button">登入</button>
    </form>
  </div>

  <script>
    // 已登入則跳轉
    fetch('/api/auth/me').then(r => {
      if (r.ok) return r.json();
    }).then(data => {
      if (data && data.userId) {
        window.location.href = '/index.html';
      }
    }).catch(() => {});

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errBox = document.getElementById('errorBox');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>登入中...';
      errBox.classList.add('hidden');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (res.ok && data.success) {
          window.location.href = data.redirect || '/index.html';
        } else {
          errBox.textContent = data.error || '登入失敗';
          errBox.classList.remove('hidden');
          btn.disabled = false;
          btn.innerHTML = '登入';
        }
      } catch {
        errBox.textContent = '網路錯誤，請稍後再試';
        errBox.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = '登入';
      }
    });
  </script>
</body>
</html>
